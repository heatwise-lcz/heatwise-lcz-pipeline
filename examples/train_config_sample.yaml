# Train config for the pipeline's Berlin sample (data/ + examples/, 8 LCZ
# classes, ~250 patches). Used by examples/job.yaml as the `train_config`
# input. max_epochs is sized so the sample training produces a meaningful
# multi-class model rather than a smoke-test artifact; early stopping
# (patience) usually ends the run well before the cap.
num_classes: 17
batch_size: 8
max_epochs: 50
patience: 10
sen2_scale: 10000.0
num_workers: 0
random_seed: 42

experiments:
  - name: HSI-BS
    hsi_field: hsi_bs
    use_sen2: false
    use_lst: false
